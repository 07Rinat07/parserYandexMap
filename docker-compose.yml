services:
  app:
    build: .
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: yandex_reviews
      MYSQL_USER: app
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  queue:
    build: .
    command: php artisan queue:work --tries=3 --timeout=190
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
      - db

  scheduler:
    build: .
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
      - db

  parser:
    build: .
    working_dir: /var/www/html/parser
    command: npm run serve
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - .:/var/www/html
    depends_on:
      - redis

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html

volumes:
  db_data:
