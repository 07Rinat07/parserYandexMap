services:
  app:
    build: .
    command: sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache && chmod -R a+rwX storage bootstrap/cache && php-fpm"
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
      - parser_node_modules:/var/www/html/parser/node_modules
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: yandex_reviews
      MYSQL_USER: app
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  queue:
    build: .
    command: sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache && chmod -R a+rwX storage bootstrap/cache && php artisan queue:work --tries=3 --timeout=190"
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
      - parser_node_modules:/var/www/html/parser/node_modules
    depends_on:
      - app
      - parser
      - redis
      - db

  scheduler:
    build: .
    command: sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache && chmod -R a+rwX storage bootstrap/cache && while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
      - parser_node_modules:/var/www/html/parser/node_modules
    depends_on:
      - app
      - redis
      - db

  parser:
    build: .
    working_dir: /var/www/html/parser
    command: npm run serve
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - .:/var/www/html
      - parser_node_modules:/var/www/html/parser/node_modules
    depends_on:
      - redis

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules

volumes:
  db_data:
  vendor:
  node_modules:
  parser_node_modules:
